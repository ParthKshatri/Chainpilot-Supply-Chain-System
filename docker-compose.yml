version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: scm_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: scm_password
      MONGO_INITDB_DATABASE: supply_chain
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: scm_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:scm_password@mongodb:27017/supply_chain?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      ML_SERVICE_URL: http://ml-service:8000
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

  ml-service:
    build: ./ml-service
    container_name: scm_ml_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://admin:scm_password@mongodb:27017/supply_chain?authSource=admin
    depends_on:
      - mongodb
    volumes:
      - ./ml-service:/app

  frontend:
    build: ./frontend
    container_name: scm_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_ML_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:
